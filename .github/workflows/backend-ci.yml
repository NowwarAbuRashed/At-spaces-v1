name: backend-ci

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: atspaces
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d atspaces"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/atspaces?schema=public
      REDIS_URL: redis://127.0.0.1:6379
      JWT_ACCESS_SECRET: test_access_secret_which_is_long_enough_for_ci
      JWT_REFRESH_SECRET: test_refresh_secret_which_is_long_enough_for_ci
      ACCESS_TOKEN_TTL_MIN: "15"
      REFRESH_TOKEN_TTL_DAYS: "14"
      ADMIN_INACTIVITY_TTL_MIN: "30"
      COOKIE_NAME_REFRESH: atspaces_rt
      COOKIE_DOMAIN: ""
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: Strict
      ENABLE_SWAGGER: "true"
      SWAGGER_PATH: api/docs
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CORS_ALLOW_CREDENTIALS: "true"
      TRUST_PROXY: ""
      ENABLE_REQUEST_LOGGING: "false"
      LOG_LEVEL: info
      HCAPTCHA_SECRET: ci_hcaptcha_secret
      HCAPTCHA_SITE_KEY: ci_hcaptcha_site_key
      HCAPTCHA_TEST_BYPASS: "true"
      HMAC_APPROVAL_REQUESTS_KEY: ci_hmac_approval_key_value_for_testing
      HMAC_VENDOR_NOTIFICATIONS_KEY: ci_hmac_vendor_key_value_for_testing
      AWS_REGION: us-east-1
      AWS_SES_FROM_EMAIL: no-reply@example.com
      AWS_SES_SECURITY_TEAM_INBOX: security@example.com
      SES_FROM_EMAIL: no-reply@example.com
      SES_SECURITY_TEAM_INBOX: security@example.com
      AWS_S3_BUCKET_PRIVATE_REPORTS: atspaces-private-reports
      AWS_S3_PRESIGN_EXP_SECONDS: "300"
      AWS_S3_SSE_MODE: SSE-S3
      AWS_S3_KMS_KEY_ID: ""
      S3_BUCKET_PRIVATE_REPORTS: atspaces-private-reports
      S3_PRESIGN_EXP_SECONDS: "300"
      S3_SSE_MODE: SSE-S3
      S3_KMS_KEY_ID: ""
      REPORT_EXPORT_MOCK: "true"
      UPLOAD_PUBLIC_BASE_URL: https://uploads.local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npm run prisma:validate

      - name: OpenAPI contract validate
        run: npm run openapi:validate

      - name: Apply migrations
        run: npm run prisma:migrate:deploy

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test:e2e

      - name: Build
        run: npm run build
